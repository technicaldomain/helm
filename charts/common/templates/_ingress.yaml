{{- define "common.ingress.tpl" -}}
{{- $ingress := default (dict) .Values.ingress -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
{{ template "common.metadata" . }}
{{- with $ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
{{- end }}
spec:
  ingressClassName: {{ $ingress.className | default "traefik" }}
  {{- if $ingress.tls }}
  tls:
    {{- toYaml $ingress.tls | nindent 4 }}
  {{- end }}
  rules:
  {{- range $ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
        {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ .serviceName | default (include "common.fullname" $) }}
                port:
                  number: {{ .servicePort | default 80 }}
        {{- end }}
  {{- end }}
{{- end -}}

{{- define "common.ingress" -}}
{{- $top := first . -}}
{{- $ingress := default (dict) $top.Values.ingress -}}
{{- $ingressEnabled := default false $ingress.enabled -}}
{{- if $ingressEnabled }}
{{- template "common.util.merge" (append . "common.ingress.tpl") -}}
{{- end }}
{{- end -}}
